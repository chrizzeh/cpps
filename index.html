<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Routine">
<meta name="theme-color" content="#111110">
<title>CPPS Routine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');
:root{
  --bg:#111110;
  --bg2:#1c1c1a;
  --bg3:#252523;
  --border:rgba(255,255,255,0.1);
  --border2:rgba(255,255,255,0.18);
  --text:#f4f0eb;
  --text2:#c8c4be;
  --text3:#8a8780;
  --accent:#d4b896;
  --red:#e87060;
  --green:#72c48a;
  --amber:#ddb84a;
  --purple:#a090e0;
  --teal:#50b8a8;
  --fascien:#c88060;
  --r:12px
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;padding-bottom:32px}

/* HEADER */
.header{padding:52px 20px 16px;border-bottom:0.5px solid var(--border)}
.header-row{display:flex;justify-content:space-between;align-items:flex-end}
.header-left h1{font-family:'DM Mono',monospace;font-size:11px;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.day-name{font-size:30px;font-weight:600;letter-spacing:-0.02em;line-height:1}
.header-right{text-align:right}
.date-str{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3)}
.day-nav{display:flex;align-items:center;gap:8px;margin-top:8px;justify-content:flex-end}
.nav-btn{background:none;border:0.5px solid var(--border2);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.nav-btn:active{background:var(--bg3)}
.faszien-badge{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.06em;padding:4px 10px;border-radius:20px;background:rgba(200,128,96,0.15);color:var(--fascien);border:0.5px solid rgba(200,128,96,0.3);margin-top:10px}

/* TIME BLOCKS */
.time-block{margin:0 20px 4px}
.time-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);padding:16px 0 8px;display:flex;align-items:center;gap:10px}
.time-label::after{content:'';flex:1;height:0.5px;background:var(--border)}

/* EXERCISE ITEMS */
.ex-item{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:0.5px solid rgba(255,255,255,0.06)}
.ex-item:last-child{border-bottom:none}
.ex-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;padding-top:4px;flex-shrink:0;width:20px}
.ex-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ex-daily{font-size:8px;font-family:'DM Mono',monospace;color:var(--text3);letter-spacing:0.03em;writing-mode:vertical-rl;transform:rotate(180deg);line-height:1}
.ex-body{flex:1;min-width:0}
.ex-name{font-size:15px;font-weight:500;color:var(--text);line-height:1.3}
.ex-dose{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);margin-top:3px}
.ex-note{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5}
.ex-stop{font-size:11px;color:var(--red);margin-top:3px;font-style:italic}
.new-phase{font-size:11px;color:var(--red);font-weight:600;margin-top:3px}
.check-btn{width:38px;height:38px;border-radius:10px;flex-shrink:0;border:0.5px solid var(--border2);background:var(--bg2);cursor:pointer;color:var(--text3);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px}
.check-btn.done{background:var(--green);border-color:var(--green);color:#111}
.check-btn:active{opacity:.7}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-row">
      <div class="header-left">
        <h1>CPPS · Routine</h1>
        <div class="day-name" id="dayName"></div>
      </div>
      <div class="header-right">
        <div class="date-str" id="dateStr"></div>
        <div class="day-nav">
          <button class="nav-btn" onclick="changeDay(-1)">←</button>
          <button class="nav-btn" onclick="changeDay(1)">→</button>
        </div>
      </div>
    </div>
    <div id="faszienBadge"></div>
  </div>
  <div id="routineList"></div>
</div>

<script>
const START = new Date('2026-05-18');
const DKEY = 'cpps_done_v3';
const MONTHS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const DAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

let dayOffset = 0;

const C = {
  v:'#a090e0', f:'#50b8a8', n:'#ddb84a', b:'#c8c4be', fasz:'#c88060'
};

// FASZIEN ITEMS (every other day: Di=1, Do=3, Sa=5)
const FASZIEN_DAYS = [2, 4, 6]; // Di, Do, Sa (0=So)

const FASZIEN = [];
// ROLLEN PAUSIERT während ESWT (4–6 Wochen ab 18.05.2026)
// Nach ESWT wieder aktivieren: Gluteus Ball, Oberschenkel Foam Roller, Bauch Pinch&Roll, Pubis, Perineum

// FOOT PROGRESSION
function getFootPhase() {
  const diff = Math.floor((getDate() - START) / 864e5);
  const w = Math.floor(diff / 7) + 1;
  if (w <= 3) return 1;
  if (w <= 7) return 2;
  if (w <= 12) return 3;
  return 4;
}
function isNewFootPhase() {
  const diff = Math.floor((getDate() - START) / 864e5);
  const w = Math.floor(diff / 7) + 1;
  return diff % 7 === 0 && (w === 4 || w === 8 || w === 13);
}
function getFootContent() {
  const fp = getFootPhase();
  const phases = {
    1: {d:'10 Min', t:'Fußsohle rollen: 2 Min./Fuß, Druckpunkte 20–30 Sek., links länger. Zehengreifen: 2×20 Wdh. Einbeinstand links (ebener Boden): 3×30 Sek.'},
    2: {d:'12 Min', t:'Fußsohle rollen: 2 Min./Fuß. Zehengreifen: 2×20 Wdh. Einbeinstand links (ebener Boden): 3×30 Sek. Fersenheben (beide): 3×15 Wdh.'},
    3: {d:'15 Min', t:'Fußsohle rollen: 2 Min./Fuß. Zehengreifen: 2×20 Wdh. Einbeinstand links (unebener Untergrund): 3×30 Sek. Einbeiniges Fersenheben links: 3×10 Wdh.'},
    4: {d:'10 Min (Erhaltung)', t:'Fußsohle rollen: 2 Min./Fuß. Einbeinstand links (unebener Untergrund): 2×45 Sek. Einbeiniges Fersenheben links: 2×15 Wdh.'}
  };
  return phases[fp];
}

// DAILY BLOCKS
const MORNING = [
  {c:C.v, n:'Tauchreflex (Kaltes Gesicht)', d:'3× 20 Sek.', t:'Schüssel kaltes Wasser. Stirn, Augen, Schläfen eintauchen, Atem anhalten. Nach jedem Durchgang 30–60 Sek. ruhig ausatmen und lange ausatmen. Nach dem 3. Mal 2 Min. ruhig stehen.', stop:'', daily:true},
  {c:C.b, n:'Spaziergang mit Sonnenlicht', d:'10 Min – kein Handy, ANC ok', t:'Aufmerksamkeit nach außen. Links Gluteus beim Abdrücken bewusst aktivieren.', stop:'', daily:true},
  {c:C.n, n:'Neural Floss (sitzend)', d:'1×15 Wdh./Seite', t:'', stop:'Brennen/Kribbeln → sofort stoppen.', daily:true}
];

const MIDDAY = [
  {c:C.v, n:'Resonanzatmung in tiefer Hocke', d:'5 Min', t:'5 Sek. ein, 5 Sek. aus. Beckenboden beim Ausatem bewusst öffnen wie eine Blume.', stop:'', daily:true},
  {c:C.n, n:'Neural Floss (sitzend)', d:'1×15 Wdh./Seite', t:'', stop:'Brennen/Kribbeln → sofort stoppen.', daily:true}
];

function getEvening() {
  const foot = getFootContent();
  return [
    {c:C.f, n:'Pigeon Pose (Piriformis)', d:'90 Sek./Seite', t:'Vorderes Bein angewinkelt, hinteres Bein gestreckt. Matte darunter. Auf Ausatem loslassen. Links länger.', stop:'', daily:true},
    {c:C.f, n:'Figure-4 Dehnung (klassisch)', d:'90 Sek./Seite', t:'Rückenlage, Knöchel auf Knie. Nur Schwerkraft, auf Ausatem loslassen. Links länger wenn möglich.', stop:'', daily:true},
    {c:C.f, n:'Hamstring Dehnung', d:'60–90 Sek./Seite', t:'Liegend: Bein hoch, Knie leicht gebeugt, Handtuch um den Fuß, Schwerkraft arbeiten lassen. Oder stehend: Ferse auf Stuhl, leicht nach vorne lehnen, Knie leicht gebeugt. Ziehen in der Kniekehle = korrekt. Links intensiver – normal.', stop:'Scharfer Schmerz oder Kribbeln → Bein mehr beugen.', daily:true},
    {c:C.f, n:'Hüftbeuger-Dehnung (Iliopsoas)', d:'60 Sek./Seite', t:'Ein Knie auf dem Boden, anderes Bein vorne. Becken leicht nach vorne schieben. Kein Hohlkreuz.', stop:'', daily:true},
    {c:C.f, n:'Wadendehnung – gerade Knie', d:'60 Sek./Seite', t:'Fuß gegen Wand, Knie gestreckt, Ferse am Boden. Links länger.', stop:'', daily:true},
    {c:C.f, n:'Wadendehnung – gebogenes Knie', d:'60 Sek./Seite', t:'Wie oben aber Knie leicht gebeugt – trifft den Soleus.', stop:'', daily:true},
    {c:C.b, n:'Fußprogramm', d:foot.d, t:foot.t, stop:'', daily:true, newPhase:isNewFootPhase()},
    {c:C.v, n:'Resonanzatmung in tiefer Hocke', d:'5 Min', t:'5 Sek. ein, 5 Sek. aus. Beckenboden beim Ausatem bewusst öffnen.', stop:'', daily:true},
    {c:C.n, n:'Neural Floss (sitzend)', d:'1×15 Wdh./Seite', t:'', stop:'Brennen/Kribbeln → sofort stoppen.', daily:true}
  ];
}

function getDate() {
  const d = new Date();
  d.setDate(d.getDate() + dayOffset);
  d.setHours(12,0,0,0);
  return d;
}
function dateKey(d) { return d.toISOString().slice(0,10); }
function getDOW(d) { return d.getDay(); }
function isFaszienDay(d) { return FASZIEN_DAYS.includes(getDOW(d)); }

function load(k) { try { return JSON.parse(localStorage.getItem(k)||'{}'); } catch(e) { return {}; } }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

function renderHeader() {
  const d = getDate();
  document.getElementById('dayName').textContent = DAYS[d.getDay()];
  document.getElementById('dateStr').textContent = d.getDate() + '. ' + MONTHS[d.getMonth()];
  const badge = document.getElementById('faszienBadge');
  badge.innerHTML = '';
  // Faszientag Badge pausiert während ESWT
}

function renderBlock(slot, items, done, key) {
  if (!items.length) return '';
  const labels = {morning:'Morgens', midday:'Tagsüber', evening:'Abends', faszien:'Faszienarbeit'};
  let html = `<div class="time-block"><div class="time-label">${labels[slot]}</div>`;
  items.forEach((ex, i) => {
    const k = slot + '_' + i;
    const isDone = !!done[k];
    html += `<div class="ex-item">
      <div class="ex-dot-wrap">
        <div class="ex-dot" style="background:${ex.c}"></div>
        <div class="ex-daily">${ex.daily?'TÄGL':''}</div>
      </div>
      <div class="ex-body">
        <div class="ex-name">${ex.n}</div>
        <div class="ex-dose">${ex.d}</div>
        ${ex.t ? `<div class="ex-note">${ex.t}</div>` : ''}
        ${ex.stop ? `<div class="ex-stop">Stop: ${ex.stop}</div>` : ''}
        ${ex.newPhase ? `<div class="new-phase">● Neue Stufe!</div>` : ''}
      </div>
      <button class="check-btn ${isDone?'done':''}" onclick="toggleDone('${key}','${k}',this)">${isDone?'✓':''}</button>
    </div>`;
  });
  return html + '</div>';
}

function renderToday() {
  const d = getDate();
  const key = dateKey(d);
  const done = load(DKEY)[key] || {};
  const evening = getEvening();
  const faszien = isFaszienDay(d) ? FASZIEN : [];

  let html = '';
  html += renderBlock('morning', MORNING, done, key);
  html += renderBlock('midday', MIDDAY, done, key);
  html += renderBlock('evening', evening, done, key);
  if (faszien.length) html += renderBlock('faszien', faszien, done, key);
  document.getElementById('routineList').innerHTML = html;
}

function toggleDone(datekey, exkey, btn) {
  const all = load(DKEY);
  if (!all[datekey]) all[datekey] = {};
  all[datekey][exkey] = !all[datekey][exkey];
  save(DKEY, all);
  btn.classList.toggle('done', all[datekey][exkey]);
  btn.innerHTML = all[datekey][exkey] ? '✓' : '';
}

function changeDay(d) {
  dayOffset += d;
  renderHeader();
  renderToday();
}

renderHeader();
renderToday();
</script>
</body>
</html>
